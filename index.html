<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunway | Інформаційний портал</title>
    <style>
        :root {
            --accent: #f39c12; 
            --dark: #000000;
            --light: #ffffff;
            --gray: #f4f4f4;
            --text-muted: #7f8c8d;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background-color: var(--gray);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--dark);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }


        .hero-container {
            display: flex;
            justify-content: center;
            background-color: var(--gray);
        }

        .hero-container img {
            width: 1980px;
            height: 900px;
    
            max-width: 100%;
            box-shadow: var(--shadow);
            display: block;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
        }

        .logo img {
            height: 60px;
            width: auto;
            display: block;
        }

        .logo-text {
            color: white;
            font-size: 24px;
            font-weight: 800;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-text span {
            display: block;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover { color: var(--accent); }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .info-block {
            background: var(--light);
            max-width: 800px;
            width: 100%;
            padding: 50px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            line-height: 1.8;
        }

        .info-block h1 {
            margin-top: 0;
            color: var(--dark);
            border-left: 5px solid var(--accent);
            padding-left: 15px;
            font-size: 28px;
        }

        .info-block p {
            font-size: 17px;
            color: #444;
            margin-bottom: 20px;
        }

        .info-block ul {
            padding-left: 20px;
            margin-bottom: 25px;
        }

        .info-block li {
            margin-bottom: 10px;
        }

        .cta-button {
            display: inline-block;
            background: var(--accent);
            color: var(--dark);
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        footer {
            background: #fff;
            padding: 40px 5%;
            border-top: 1px solid #ddd;
            text-align: center;
        }

        footer p { margin: 5px 0; font-size: 14px; color: var(--text-muted); }

        @media (max-width: 600px) {
            .info-block { padding: 30px 20px; }
            nav { display: none; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="SunWay Photo/SunWay.png" alt="Logo">
        <div class="logo-text">
            SunWay
        </div>
    </a>
    <nav>
        <a href="#">Новинки</a>
        <a href="#">Каталог</a>
        <a href="#">Про нас</a>
        <a href="#">Контакти</a>
    </nav>
</header>

<div class="hero-container">
    <img src="SunWay Photo/SunWayHero.jpg" alt="Hero">
</div>

<main class="main-container">
    <article class="info-block">
        <h1>Ласкаво просимо до Sunway</h1>
        
        <p>Ведіть Текст</p>
        
        <p><strong>Чому обирають нас:</strong></p>
        <ul>
            <li>Ведіть текст</li>
        </ul>
    </article>
</main>

<footer>
    <p><strong>📍 Адреса:</strong> с. Рованці, вулиця Будівельна, 60 SunWay</p>
    <p><strong>⏰ Графік:</strong> Пн-Пт: 9:00 - 18:00 | Сб: 9:00 - 16:00</p>
    <p>&copy; 2026 sunway.ua2025@gmail.com</p>
</footer>

</body>
</html>
